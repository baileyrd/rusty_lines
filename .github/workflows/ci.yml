name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - run: rustup update stable && rustup default stable
      - run: cargo build --locked --all-targets
      - run: cargo test --locked

  windows-check:
    # The non-Unix fallback path is a plain buffered read; make sure it
    # keeps compiling even though nothing exercises it at runtime.
    name: Check (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup update stable && rustup default stable
      - run: cargo check --locked --all-targets
      - run: cargo test --locked

  libc-backend:
    # rusty_libc is the default backend on Linux, so the plain test job
    # already covers it; this exercises the libc escape hatch, which
    # otherwise only builds on macOS.
    name: Feature (libc-backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup update stable && rustup default stable && rustup component add clippy
      - run: cargo test --locked --no-default-features --features libc-backend
      - run: cargo clippy --locked --all-targets --no-default-features --features libc-backend -- -D warnings

  lint:
    name: Clippy + rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup update stable && rustup default stable && rustup component add clippy rustfmt
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo fmt --check
      - run: cargo doc --locked --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup toolchain install 1.88 --profile minimal && rustup default 1.88
      - run: cargo check --locked --all-targets

  bench:
    # bench/ is deliberately not a workspace member (keeps the editor
    # itself dependency-free), so nothing else here verifies it still
    # builds against current rustyline/reedline releases or that its
    # committed Cargo.lock stays valid. Build/lint only — not a full
    # run, which needs a real pty and would add timing-sensitive
    # flakiness to CI for no benefit; run it by hand to get numbers.
    name: Check (bench/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: rustup update stable && rustup default stable && rustup component add clippy
      - run: cargo build --locked --all-targets --manifest-path bench/Cargo.toml
      - run: cargo clippy --locked --all-targets --manifest-path bench/Cargo.toml -- -D warnings
