name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - run: cargo build --all-targets
      - run: cargo test

  windows-check:
    # The non-Unix fallback path is a plain buffered read; make sure it
    # keeps compiling even though nothing exercises it at runtime.
    name: Check (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - run: cargo check --all-targets
      - run: cargo test

  lint:
    name: Clippy + rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable && rustup component add clippy rustfmt
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --check
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install 1.88 --profile minimal && rustup default 1.88
      - run: cargo check --all-targets
